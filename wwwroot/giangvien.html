<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giảng Viên - English Center</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="topbar">
            <h2>👨‍🏫 Quản Lý Giảng Viên</h2>
            <div class="user-info"><span id="lblUser"></span><div class="user-avatar">A</div></div>
        </div>
        <div class="page-content">
            <div class="card">
                <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; gap:12px;">
                        <input type="text" id="txtSearch" class="form-control-plain" placeholder="Tìm mã, tên GV..." style="width:250px;">
                        <button class="btn btn-info" id="btnSearch" onclick="searchData()">🔍 Tìm kiếm</button>
                    </div>
                    <button class="btn btn-primary" id="btnAdd" onclick="showModal()">➕ Thêm Giảng Viên</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Mã GV</th><th>Họ Tên</th><th>Trình Độ</th><th>SĐT</th><th>Thao Tác</th></tr></thead>
                        <tbody id="dgvGiangVien">
                            <tr><td colspan="5"><div class="loading"><div class="spinner"></div> Đang tải...</div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Overlay -->
<div class="modal" id="modalForm">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Thêm Giảng Viên</h3>
            <button class="btn-icon" onclick="hideModal()">✖</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="txtMaGiangVien">Mã Giảng Viên</label>
                    <input type="text" class="form-control-plain" id="txtMaGiangVien" name="txtMaGiangVien">
                </div>
                <div class="form-group">
                    <label for="txtHoTen">Họ Tên</label>
                    <input type="text" class="form-control-plain" id="txtHoTen" name="txtHoTen">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="cboTrinhDo">Trình Độ</label>
                    <select class="form-control-plain" id="cboTrinhDo" name="cboTrinhDo">
                        <option value="Đại học">Đại học</option>
                        <option value="Thạc sĩ">Thạc sĩ</option>
                        <option value="Tiến sĩ">Tiến sĩ</option>
                        <option value="IELTS 8.0+">IELTS 8.0+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="txtSoDienThoai">Số Điện Thoại</label>
                    <input type="text" class="form-control-plain" id="txtSoDienThoai" name="txtSoDienThoai">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="hideModal()">Hủy</button>
            <button class="btn btn-success" id="btnSave" onclick="saveData()">💾 Lưu</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/app.js"></script>
<script>
    checkAuth(); renderSidebar('giangvien'); setUserInfo();
    let isEdit = false;

    async function loadData(keyword = '') {
        const url = keyword ? `/api/GiangVien/search?keyword=${keyword}` : '/api/GiangVien';
        const res = await fetch(url);
        const data = await res.json();
        const tbody = document.getElementById('dgvGiangVien');
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">Không có dữ liệu</div></td></tr>'; return; }
        tbody.innerHTML = data.map(g => `<tr>
            <td><span class="badge badge-info">${g.maGiangVien}</span></td>
            <td><strong>${g.hoTen}</strong></td>
            <td><span class="badge badge-warning">${g.trinhDo}</span></td>
            <td>${g.soDienThoai}</td>
            <td>
                <button class="btn-icon edit" onclick="editData('${g.maGiangVien}')">✏️</button>
                <button class="btn-icon delete" onclick="deleteData('${g.maGiangVien}')">🗑️</button>
            </td>
        </tr>`).join('');
    }

    function searchData() { loadData(document.getElementById('txtSearch').value); }

    function showModal() { document.getElementById('modalForm').classList.add('active'); }
    function hideModal() { document.getElementById('modalForm').classList.remove('active'); clearForm(); }
    function clearForm() {
        isEdit = false;
        document.getElementById('txtMaGiangVien').value = '';
        document.getElementById('txtMaGiangVien').disabled = false;
        document.getElementById('txtHoTen').value = '';
        document.getElementById('txtSoDienThoai').value = '';
        document.getElementById('modalTitle').innerText = "Thêm Giảng Viên";
    }

    async function saveData() {
        const g = {
            maGiangVien: document.getElementById('txtMaGiangVien').value.trim(),
            hoTen: document.getElementById('txtHoTen').value.trim(),
            trinhDo: document.getElementById('cboTrinhDo').value,
            soDienThoai: document.getElementById('txtSoDienThoai').value.trim()
        };
        if (!g.maGiangVien || !g.hoTen) { showToast('Vui lòng nhập Mã và Tên!', 'error'); return; }

        const url = isEdit ? `/api/GiangVien/${g.maGiangVien}` : '/api/GiangVien';
        const method = isEdit ? 'PUT' : 'POST';

        const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(g) });
        if (res.ok) { showToast('Lưu thành công!', 'success'); hideModal(); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    async function editData(id) {
        const res = await fetch(`/api/GiangVien`); // Actually we should fetch by id, but for simplicity
        const data = await res.json();
        const g = data.find(x => x.maGiangVien === id);
        isEdit = true;
        document.getElementById('modalTitle').innerText = "Sửa Giảng Viên";
        document.getElementById('txtMaGiangVien').value = g.maGiangVien;
        document.getElementById('txtMaGiangVien').disabled = true;
        document.getElementById('txtHoTen').value = g.hoTen;
        document.getElementById('cboTrinhDo').value = g.trinhDo;
        document.getElementById('txtSoDienThoai').value = g.soDienThoai;
        showModal();
    }

    async function deleteData(id) {
        if (!confirm('Bạn có chắc chắn muốn xóa?')) return;
        const res = await fetch(`/api/GiangVien/${id}`, { method:'DELETE' });
        if (res.ok) { showToast('Xóa thành công!', 'success'); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    loadData();
</script>
</body>
</html>
