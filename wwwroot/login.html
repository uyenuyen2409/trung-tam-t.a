<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - English Center Manager</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1c29 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-header h2 { font-weight: 700; margin-bottom: 8px; }
        .login-header p { color: var(--text-muted); font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .login-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }
        .login-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(240, 165, 0, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #d18f00);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px var(--accent); }
        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-toggle a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-toggle a:hover { text-decoration: underline; }
        
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 { width: 300px; height: 300px; background: var(--primary-light); top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: rgba(240, 165, 0, 0.2); bottom: -150px; right: -150px; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="login-container">
    <div class="login-header">
        <div class="login-logo">🎓</div>
        <h2 id="formTitle">Đăng Nhập</h2>
        <p id="formSubtitle">Hệ thống quản lý trung tâm tiếng Anh</p>
    </div>

    <div class="form-group">
        <label for="txtTenDangNhap">Tên đăng nhập</label>
        <input type="text" id="txtTenDangNhap" class="login-input" placeholder="Nhập tên đăng nhập" autocomplete="off">
    </div>
    
    <div class="form-group">
        <label for="txtMatKhau">Mật khẩu</label>
        <input type="password" id="txtMatKhau" class="login-input" placeholder="••••••••">
    </div>

    <button id="btnAction" class="btn-login" onclick="handleAuth()">Đăng Nhập</button>

    <div class="auth-toggle">
        <span id="toggleText">Bạn chưa có tài khoản? </span>
        <a id="toggleLink" onclick="toggleMode()">Đăng ký ngay</a>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/app.js"></script>
<script>
    // Kiểm tra nếu đã login thì đá vào trong
    if(localStorage.getItem('ec_user')) {
        window.location.href = 'index.html';
    }

    let isLoginMode = false; // By default, show Register mode as requested "mới vào là phải tạo tài khoản luôn"

    function setMode() {
        if(isLoginMode) {
            document.getElementById('formTitle').innerText = "Đăng Nhập";
            document.getElementById('formSubtitle').innerText = "Chào mừng bạn quay trở lại!";
            document.getElementById('btnAction').innerText = "Đăng Nhập";
            document.getElementById('toggleText').innerText = "Bạn chưa có tài khoản? ";
            document.getElementById('toggleLink').innerText = "Đăng ký ngay";
        } else {
            document.getElementById('formTitle').innerText = "Tạo Tài Khoản Mới";
            document.getElementById('formSubtitle').innerText = "Đăng ký tài khoản để quản lý trung tâm";
            document.getElementById('btnAction').innerText = "Đăng Ký";
            document.getElementById('toggleText').innerText = "Đã có tài khoản? ";
            document.getElementById('toggleLink').innerText = "Đăng nhập ngay";
        }
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        setMode();
    }

    // Set initial mode to Register
    setMode();

    document.getElementById('txtMatKhau').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleAuth();
    });

    async function handleAuth() {
        const u = document.getElementById('txtTenDangNhap').value.trim();
        const p = document.getElementById('txtMatKhau').value;

        if(!u || !p) {
            showToast('Vui lòng nhập đầy đủ thông tin!', 'error');
            return;
        }

        const endpoint = isLoginMode ? '/api/TaiKhoan/login' : '/api/TaiKhoan/register';
        const payload = { tenDangNhap: u, matKhau: p };

        const btn = document.getElementById('btnAction');
        const originalText = btn.innerText;
        btn.innerText = "Đang xử lý...";
        btn.disabled = true;

        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (res.ok) {
                showToast(data.message, 'success');
                localStorage.setItem('ec_user', data.tenDangNhap);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showToast(data.message || 'Có lỗi xảy ra', 'error');
            }
        } catch (error) {
            showToast('Lỗi kết nối Server', 'error');
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
