<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng nhập hệ thống Quản lý Trung tâm Tiếng Anh">
    <title>Đăng Nhập - English Center Manager</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-logo">
                <div class="logo-icon">🎓</div>
                <h1>English Center</h1>
                <p>Hệ thống Quản lý Trung tâm Tiếng Anh</p>
            </div>

            <form id="frmLogin" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="txtTenDangNhap">Tên đăng nhập</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" class="form-control" id="txtTenDangNhap" name="txtTenDangNhap"
                               placeholder="Nhập tên đăng nhập..." required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="txtMatKhau">Mật khẩu</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" class="form-control" id="txtMatKhau" name="txtMatKhau"
                               placeholder="Nhập mật khẩu..." required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" id="btnDangNhap" class="btn btn-primary btn-block" style="margin-top: 8px;">
                    🚀 Đăng Nhập
                </button>
            </form>

            <p style="text-align:center; margin-top:20px; color:var(--text-muted); font-size:0.8rem;">
                Tài khoản mặc định: <strong style="color:var(--accent);">admin / admin123</strong>
            </p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '';

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const tenDangNhap = document.getElementById('txtTenDangNhap').value.trim();
            const matKhau = document.getElementById('txtMatKhau').value.trim();

            if (!tenDangNhap || !matKhau) {
                showToast('Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            const btn = document.getElementById('btnDangNhap');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Đang xác thực...';

            try {
                const res = await fetch(`${API_BASE}/api/TaiKhoan/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenDangNhap, matKhau })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast('Đăng nhập thành công!', 'success');
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('user', tenDangNhap);
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else {
                    showToast(data.message || 'Đăng nhập thất bại!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '🚀 Đăng Nhập';
                }
            } catch (err) {
                showToast('Lỗi kết nối đến server!', 'error');
                btn.disabled = false;
                btn.innerHTML = '🚀 Đăng Nhập';
            }
        }
    </script>
</body>
</html>
