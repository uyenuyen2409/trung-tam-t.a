<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Học - English Center</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="topbar">
            <h2>🏫 Quản Lý Lớp Học</h2>
            <div class="user-info"><span id="lblUser"></span><div class="user-avatar">A</div></div>
        </div>
        <div class="page-content">
            <div class="card">
                <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; gap:12px;">
                        <input type="text" id="txtSearch" class="form-control-plain" placeholder="Tìm mã, tên lớp..." style="width:250px;">
                        <button class="btn btn-info" id="btnSearch" onclick="searchData()">🔍 Tìm kiếm</button>
                    </div>
                    <button class="btn btn-primary" id="btnAdd" onclick="showModal()">➕ Thêm Lớp Học</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Mã Lớp</th><th>Tên Lớp</th><th>Phòng Học</th><th>Khóa Học</th><th>Thao Tác</th></tr></thead>
                        <tbody id="dgvLopHoc">
                            <tr><td colspan="5"><div class="loading"><div class="spinner"></div> Đang tải...</div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Overlay -->
<div class="modal" id="modalForm">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Thêm Lớp Học</h3>
            <button class="btn-icon" onclick="hideModal()">✖</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="txtMaLopHoc">Mã Lớp Học</label>
                    <input type="text" class="form-control-plain" id="txtMaLopHoc" name="txtMaLopHoc">
                </div>
                <div class="form-group">
                    <label for="txtTenLopHoc">Tên Lớp</label>
                    <input type="text" class="form-control-plain" id="txtTenLopHoc" name="txtTenLopHoc">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="txtPhongHoc">Phòng Học</label>
                    <input type="text" class="form-control-plain" id="txtPhongHoc" name="txtPhongHoc">
                </div>
                <div class="form-group">
                    <label for="cboKhoaHoc">Khóa Học (INNER JOIN)</label>
                    <select class="form-control-plain" id="cboKhoaHoc" name="cboKhoaHoc"></select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="hideModal()">Hủy</button>
            <button class="btn btn-success" id="btnSave" onclick="saveData()">💾 Lưu</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/app.js"></script>
<script>
    checkAuth(); renderSidebar('lophoc'); setUserInfo();
    let isEdit = false;

    async function loadCombos() {
        const res = await fetch('/api/KhoaHoc');
        const data = await res.json();
        const cbo = document.getElementById('cboKhoaHoc');
        cbo.innerHTML = data.map(k => `<option value="${k.maKhoaHoc}">${k.tenKhoaHoc}</option>`).join('');
    }

    async function loadData(keyword = '') {
        const url = keyword ? `/api/LopHoc/search?keyword=${keyword}` : '/api/LopHoc';
        const res = await fetch(url);
        const data = await res.json();
        const tbody = document.getElementById('dgvLopHoc');
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">Không có dữ liệu</div></td></tr>'; return; }
        tbody.innerHTML = data.map(l => `<tr>
            <td><span class="badge badge-info">${l.maLopHoc}</span></td>
            <td><strong>${l.tenLopHoc}</strong></td>
            <td>${l.phongHoc}</td>
            <td><span class="badge badge-success">${l.tenKhoaHoc}</span></td>
            <td>
                <button class="btn-icon edit" onclick="editData('${l.maLopHoc}', '${l.tenLopHoc}', '${l.phongHoc}', '${l.maKhoaHoc}')">✏️</button>
                <button class="btn-icon delete" onclick="deleteData('${l.maLopHoc}')">🗑️</button>
            </td>
        </tr>`).join('');
    }

    function searchData() { loadData(document.getElementById('txtSearch').value); }

    function showModal() { document.getElementById('modalForm').classList.add('active'); }
    function hideModal() { document.getElementById('modalForm').classList.remove('active'); clearForm(); }
    function clearForm() {
        isEdit = false;
        document.getElementById('txtMaLopHoc').value = '';
        document.getElementById('txtMaLopHoc').disabled = false;
        document.getElementById('txtTenLopHoc').value = '';
        document.getElementById('txtPhongHoc').value = '';
        document.getElementById('modalTitle').innerText = "Thêm Lớp Học";
    }

    async function saveData() {
        const l = {
            maLopHoc: document.getElementById('txtMaLopHoc').value.trim(),
            tenLopHoc: document.getElementById('txtTenLopHoc').value.trim(),
            phongHoc: document.getElementById('txtPhongHoc').value.trim(),
            maKhoaHoc: document.getElementById('cboKhoaHoc').value
        };
        if (!l.maLopHoc || !l.tenLopHoc) { showToast('Vui lòng nhập Mã và Tên!', 'error'); return; }

        const url = isEdit ? `/api/LopHoc/${l.maLopHoc}` : '/api/LopHoc';
        const method = isEdit ? 'PUT' : 'POST';

        const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(l) });
        if (res.ok) { showToast('Lưu thành công!', 'success'); hideModal(); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    function editData(id, ten, phong, khoa) {
        isEdit = true;
        document.getElementById('modalTitle').innerText = "Sửa Lớp Học";
        document.getElementById('txtMaLopHoc').value = id;
        document.getElementById('txtMaLopHoc').disabled = true;
        document.getElementById('txtTenLopHoc').value = ten;
        document.getElementById('txtPhongHoc').value = phong;
        document.getElementById('cboKhoaHoc').value = khoa;
        showModal();
    }

    async function deleteData(id) {
        if (!confirm('Bạn có chắc chắn muốn xóa?')) return;
        const res = await fetch(`/api/LopHoc/${id}`, { method:'DELETE' });
        if (res.ok) { showToast('Xóa thành công!', 'success'); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    loadCombos().then(() => loadData());
</script>
</body>
</html>
