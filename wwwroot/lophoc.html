<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lớp Học - English Center</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="topbar">
            <h2>🏫 Quản Lý Lớp Học</h2>
            <div class="user-info"><span id="lblUser"></span><div class="user-avatar">A</div></div>
        </div>
        <div class="page-content">
            <div class="card" style="margin-bottom:24px">
                <div class="card-header">
                    <h3>📋 Thông Tin Lớp Học</h3>
                    <button class="btn btn-outline btn-sm" onclick="resetForm()">🔄 Làm mới</button>
                </div>
                <div class="card-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="txtMaLopHoc">Mã Lớp Học</label>
                            <input type="text" class="form-control-plain" id="txtMaLopHoc" name="txtMaLopHoc" placeholder="VD: LH003">
                        </div>
                        <div class="form-group">
                            <label for="txtTenLopHoc">Tên Lớp Học</label>
                            <input type="text" class="form-control-plain" id="txtTenLopHoc" name="txtTenLopHoc" placeholder="GiaoTiep_01...">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="txtPhongHoc">Phòng Học</label>
                            <input type="text" class="form-control-plain" id="txtPhongHoc" name="txtPhongHoc" placeholder="Phòng A1">
                        </div>
                        <div class="form-group">
                            <label for="cboKhoaHoc">Khóa Học</label>
                            <select class="form-control-plain" id="cboKhoaHoc" name="cboKhoaHoc"></select>
                        </div>
                    </div>
                    <div style="display:flex;gap:10px;margin-top:8px">
                        <button class="btn btn-success" id="btnThem" onclick="themLH()">➕ Thêm Mới</button>
                        <button class="btn btn-info" id="btnSua" onclick="suaLH()" style="display:none">💾 Cập Nhật</button>
                        <button class="btn btn-outline" id="btnHuy" onclick="resetForm()" style="display:none">❌ Hủy</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3>📃 Danh Sách Lớp Học (INNER JOIN Khóa Học)</h3></div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Mã Lớp</th><th>Tên Lớp</th><th>Phòng Học</th><th>Mã KH</th><th>Tên Khóa Học</th><th>Thao Tác</th></tr></thead>
                        <tbody id="dgvLopHoc">
                            <tr><td colspan="6"><div class="loading"><div class="spinner"></div> Đang tải...</div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="js/app.js"></script>
<script>
    checkAuth(); renderSidebar('lophoc'); setUserInfo();

    async function loadKhoaHoc() {
        const res = await fetch('/api/KhoaHoc');
        const data = await res.json();
        const cbo = document.getElementById('cboKhoaHoc');
        cbo.innerHTML = '<option value="">-- Chọn Khóa Học --</option>' +
            data.map(k => `<option value="${k.maKhoaHoc}">${k.maKhoaHoc} - ${k.tenKhoaHoc}</option>`).join('');
    }

    async function loadData() {
        try {
            const res = await fetch('/api/LopHoc');
            const data = await res.json();
            const tbody = document.getElementById('dgvLopHoc');
            if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div><p>Chưa có lớp học</p></div></td></tr>'; return; }
            tbody.innerHTML = data.map(l => `<tr>
                <td><span class="badge badge-info">${l.maLopHoc}</span></td>
                <td><strong>${l.tenLopHoc}</strong></td>
                <td>${l.phongHoc}</td>
                <td>${l.maKhoaHoc}</td>
                <td><span class="badge badge-success">${l.tenKhoaHoc}</span></td>
                <td><div class="action-btns">
                    <button class="btn-icon edit" onclick="editLH('${l.maLopHoc}','${l.tenLopHoc}','${l.phongHoc}','${l.maKhoaHoc}')">✏️</button>
                    <button class="btn-icon delete" onclick="deleteLH('${l.maLopHoc}')">🗑️</button>
                </div></td>
            </tr>`).join('');
        } catch(e) { showToast('Lỗi!', 'error'); }
    }

    async function themLH() {
        const d = getFormData();
        if (!d.maLopHoc || !d.tenLopHoc || !d.maKhoaHoc) { showToast('Vui lòng nhập đầy đủ!', 'error'); return; }
        const res = await fetch('/api/LopHoc', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
        if (res.ok) { showToast('Thêm thành công!', 'success'); resetForm(); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    function editLH(ma, ten, phong, maKH) {
        document.getElementById('txtMaLopHoc').value = ma;
        document.getElementById('txtMaLopHoc').readOnly = true;
        document.getElementById('txtTenLopHoc').value = ten;
        document.getElementById('txtPhongHoc').value = phong;
        document.getElementById('cboKhoaHoc').value = maKH;
        document.getElementById('btnThem').style.display = 'none';
        document.getElementById('btnSua').style.display = '';
        document.getElementById('btnHuy').style.display = '';
    }

    async function suaLH() {
        const d = getFormData();
        const res = await fetch(`/api/LopHoc/${d.maLopHoc}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
        if (res.ok) { showToast('Cập nhật thành công!', 'success'); resetForm(); loadData(); }
        else { showToast('Lỗi!', 'error'); }
    }

    async function deleteLH(id) {
        if (!confirm('Xóa lớp học này?')) return;
        const res = await fetch(`/api/LopHoc/${id}`, { method:'DELETE' });
        if (res.ok) { showToast('Xóa thành công!', 'success'); loadData(); }
    }

    function getFormData() {
        return {
            maLopHoc: document.getElementById('txtMaLopHoc').value.trim(),
            tenLopHoc: document.getElementById('txtTenLopHoc').value.trim(),
            phongHoc: document.getElementById('txtPhongHoc').value.trim(),
            maKhoaHoc: document.getElementById('cboKhoaHoc').value
        };
    }

    function resetForm() {
        document.getElementById('txtMaLopHoc').value = ''; document.getElementById('txtMaLopHoc').readOnly = false;
        document.getElementById('txtTenLopHoc').value = '';
        document.getElementById('txtPhongHoc').value = '';
        document.getElementById('cboKhoaHoc').selectedIndex = 0;
        document.getElementById('btnThem').style.display = '';
        document.getElementById('btnSua').style.display = 'none';
        document.getElementById('btnHuy').style.display = 'none';
    }

    loadKhoaHoc(); loadData();
</script>
</body>
</html>
