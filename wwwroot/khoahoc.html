<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa Học - English Center</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="topbar">
            <h2>📚 Quản Lý Khóa Học</h2>
            <div class="user-info"><span id="lblUser"></span><div class="user-avatar">A</div></div>
        </div>
        <div class="page-content">
            <div class="card">
                <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; gap:12px;">
                        <input type="text" id="txtSearch" class="form-control-plain" placeholder="Tìm mã, tên khóa học..." style="width:250px;">
                        <button class="btn btn-info" id="btnSearch" onclick="searchData()">🔍 Tìm kiếm</button>
                    </div>
                    <button class="btn btn-primary" id="btnAdd" onclick="showModal()">➕ Thêm Khóa Học</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Mã KH</th><th>Tên Khóa Học</th><th>Học Phí</th><th>Số Buổi</th><th>Thao Tác</th></tr></thead>
                        <tbody id="dgvKhoaHoc">
                            <tr><td colspan="5"><div class="loading"><div class="spinner"></div> Đang tải...</div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Overlay -->
<div class="modal" id="modalForm">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Thêm Khóa Học</h3>
            <button class="btn-icon" onclick="hideModal()">✖</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="txtMaKhoaHoc">Mã Khóa Học</label>
                    <input type="text" class="form-control-plain" id="txtMaKhoaHoc" name="txtMaKhoaHoc">
                </div>
                <div class="form-group">
                    <label for="txtTenKhoaHoc">Tên Khóa Học</label>
                    <input type="text" class="form-control-plain" id="txtTenKhoaHoc" name="txtTenKhoaHoc">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="txtHocPhi">Học Phí (VNĐ)</label>
                    <input type="number" class="form-control-plain" id="txtHocPhi" name="txtHocPhi">
                </div>
                <div class="form-group">
                    <label for="txtSoBuoiHoc">Số Buổi Học</label>
                    <input type="number" class="form-control-plain" id="txtSoBuoiHoc" name="txtSoBuoiHoc">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="hideModal()">Hủy</button>
            <button class="btn btn-success" id="btnSave" onclick="saveData()">💾 Lưu</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/app.js"></script>
<script>
    checkAuth(); renderSidebar('khoahoc'); setUserInfo();
    let isEdit = false;

    async function loadData(keyword = '') {
        const url = keyword ? `/api/KhoaHoc/search?keyword=${keyword}` : '/api/KhoaHoc';
        const res = await fetch(url);
        const data = await res.json();
        const tbody = document.getElementById('dgvKhoaHoc');
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">Không có dữ liệu</div></td></tr>'; return; }
        tbody.innerHTML = data.map(k => `<tr>
            <td><span class="badge badge-info">${k.maKhoaHoc}</span></td>
            <td><strong>${k.tenKhoaHoc}</strong></td>
            <td style="color:var(--success);font-weight:600">${formatVND(k.hocPhi)}</td>
            <td>${k.soBuoiHoc} buổi</td>
            <td>
                <button class="btn-icon edit" onclick="editData('${k.maKhoaHoc}')">✏️</button>
                <button class="btn-icon delete" onclick="deleteData('${k.maKhoaHoc}')">🗑️</button>
            </td>
        </tr>`).join('');
    }

    function searchData() { loadData(document.getElementById('txtSearch').value); }

    function showModal() { document.getElementById('modalForm').classList.add('active'); }
    function hideModal() { document.getElementById('modalForm').classList.remove('active'); clearForm(); }
    function clearForm() {
        isEdit = false;
        document.getElementById('txtMaKhoaHoc').value = '';
        document.getElementById('txtMaKhoaHoc').disabled = false;
        document.getElementById('txtTenKhoaHoc').value = '';
        document.getElementById('txtHocPhi').value = '';
        document.getElementById('txtSoBuoiHoc').value = '';
        document.getElementById('modalTitle').innerText = "Thêm Khóa Học";
    }

    async function saveData() {
        const k = {
            maKhoaHoc: document.getElementById('txtMaKhoaHoc').value.trim(),
            tenKhoaHoc: document.getElementById('txtTenKhoaHoc').value.trim(),
            hocPhi: parseFloat(document.getElementById('txtHocPhi').value) || 0,
            soBuoiHoc: parseInt(document.getElementById('txtSoBuoiHoc').value) || 0
        };
        if (!k.maKhoaHoc || !k.tenKhoaHoc) { showToast('Vui lòng nhập Mã và Tên!', 'error'); return; }

        const url = isEdit ? `/api/KhoaHoc/${k.maKhoaHoc}` : '/api/KhoaHoc';
        const method = isEdit ? 'PUT' : 'POST';

        const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(k) });
        if (res.ok) { showToast('Lưu thành công!', 'success'); hideModal(); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    async function editData(id) {
        const res = await fetch(`/api/KhoaHoc/${id}`);
        const k = await res.json();
        isEdit = true;
        document.getElementById('modalTitle').innerText = "Sửa Khóa Học";
        document.getElementById('txtMaKhoaHoc').value = k.maKhoaHoc;
        document.getElementById('txtMaKhoaHoc').disabled = true;
        document.getElementById('txtTenKhoaHoc').value = k.tenKhoaHoc;
        document.getElementById('txtHocPhi').value = k.hocPhi;
        document.getElementById('txtSoBuoiHoc').value = k.soBuoiHoc;
        showModal();
    }

    async function deleteData(id) {
        if (!confirm('Bạn có chắc chắn muốn xóa?')) return;
        const res = await fetch(`/api/KhoaHoc/${id}`, { method:'DELETE' });
        if (res.ok) { showToast('Xóa thành công!', 'success'); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    loadData();
</script>
</body>
</html>
