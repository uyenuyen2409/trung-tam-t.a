<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - English Center</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="topbar">
            <h2>💳 Thanh Toán Học Phí</h2>
            <div class="user-info"><span id="lblUser"></span><div class="user-avatar">A</div></div>
        </div>
        <div class="page-content">
            <div class="card">
                <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>📃 Danh Sách Hóa Đơn</h3>
                    <button class="btn btn-primary" id="btnAdd" onclick="showModal()">➕ Lập Phiếu Thu</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Mã HĐ</th><th>Mã ĐK</th><th>Học Viên</th><th>Khóa Học</th><th>Số Tiền</th><th>Ngày TT</th><th>Thao Tác</th></tr></thead>
                        <tbody id="dgvThanhToan">
                            <tr><td colspan="7"><div class="loading"><div class="spinner"></div> Đang tải...</div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Overlay -->
<div class="modal" id="modalForm">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Lập Phiếu Thu</h3>
            <button class="btn-icon" onclick="hideModal()">✖</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="txtMaHoaDon">Mã Hóa Đơn</label>
                    <input type="text" class="form-control-plain" id="txtMaHoaDon" name="txtMaHoaDon" placeholder="VD: HD001">
                </div>
                <div class="form-group">
                    <label for="cboDangKy">Lượt Đăng Ký</label>
                    <select class="form-control-plain" id="cboDangKy" name="cboDangKy"></select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="txtSoTienThu">Số Tiền Thu (VNĐ)</label>
                    <input type="number" class="form-control-plain" id="txtSoTienThu" name="txtSoTienThu">
                </div>
                <div class="form-group">
                    <label for="dtpNgayThanhToan">Ngày Thanh Toán</label>
                    <input type="date" class="form-control-plain" id="dtpNgayThanhToan" name="dtpNgayThanhToan">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="hideModal()">Hủy</button>
            <button class="btn btn-success" id="btnSave" onclick="saveData()">💳 Thanh Toán</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/app.js"></script>
<script>
    checkAuth(); renderSidebar('thanhtoan'); setUserInfo();
    
    function showModal() { 
        document.getElementById('modalForm').classList.add('active'); 
        document.getElementById('dtpNgayThanhToan').value = new Date().toISOString().split('T')[0];
    }
    function hideModal() { 
        document.getElementById('modalForm').classList.remove('active'); 
        document.getElementById('txtMaHoaDon').value = '';
        document.getElementById('txtSoTienThu').value = '';
    }

    async function loadDangKy() {
        const res = await fetch('/api/DangKyHoc');
        const data = await res.json();
        document.getElementById('cboDangKy').innerHTML = '<option value="">-- Chọn Đăng Ký --</option>' +
            data.map(d => `<option value="${d.maDangKy}">${d.maDangKy} - ${d.tenHocVien} / ${d.tenKhoaHoc}</option>`).join('');
    }

    async function loadData() {
        const res = await fetch('/api/ThanhToan');
        const data = await res.json();
        const tbody = document.getElementById('dgvThanhToan');
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">Chưa có hóa đơn</div></td></tr>'; return; }
        tbody.innerHTML = data.map(t => `<tr>
            <td><span class="badge badge-info">${t.maHoaDon}</span></td>
            <td>${t.maDangKy}</td>
            <td><strong>${t.tenHocVien}</strong></td>
            <td>${t.tenKhoaHoc}</td>
            <td style="color:var(--success);font-weight:700">${formatVND(t.soTienThu)}</td>
            <td>${formatDate(t.ngayThanhToan)}</td>
            <td><button class="btn-icon delete" onclick="deleteData('${t.maHoaDon}')">🗑️</button></td>
        </tr>`).join('');
    }

    async function saveData() {
        const d = {
            maHoaDon: document.getElementById('txtMaHoaDon').value.trim(),
            maDangKy: document.getElementById('cboDangKy').value,
            soTienThu: parseFloat(document.getElementById('txtSoTienThu').value) || 0,
            ngayThanhToan: document.getElementById('dtpNgayThanhToan').value
        };
        if (!d.maHoaDon || !d.maDangKy || !d.soTienThu) { showToast('Nhập đủ thông tin!', 'error'); return; }
        const res = await fetch('/api/ThanhToan', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
        if (res.ok) { showToast('Thanh toán thành công!', 'success'); hideModal(); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    async function deleteData(id) {
        if (!confirm('Xóa hóa đơn này?')) return;
        const res = await fetch(`/api/ThanhToan/${id}`, { method:'DELETE' });
        if (res.ok) { showToast('Xóa thành công!', 'success'); loadData(); }
    }

    loadDangKy(); loadData();
</script>
</body>
</html>
