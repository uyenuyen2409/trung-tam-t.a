<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Học - English Center</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="topbar">
            <h2>📝 Đăng Ký Học (Quan hệ M-N)</h2>
            <div class="user-info"><span id="lblUser"></span><div class="user-avatar">A</div></div>
        </div>
        <div class="page-content">
            <div class="card">
                <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>📃 Danh Sách Đăng Ký</h3>
                    <button class="btn btn-primary" id="btnAdd" onclick="showModal()">➕ Ghi Danh Học Viên</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Mã ĐK</th><th>Học Viên</th><th>Khóa Học</th><th>Học Phí</th><th>Ngày ĐK</th><th>Thao Tác</th></tr></thead>
                        <tbody id="dgvDangKy">
                            <tr><td colspan="6"><div class="loading"><div class="spinner"></div> Đang tải...</div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Overlay -->
<div class="modal" id="modalForm">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Ghi Danh Khóa Học</h3>
            <button class="btn-icon" onclick="hideModal()">✖</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="txtMaDangKy">Mã Đăng Ký</label>
                    <input type="text" class="form-control-plain" id="txtMaDangKy" name="txtMaDangKy" placeholder="VD: DK001">
                </div>
                <div class="form-group">
                    <label for="cboHocVien">Học Viên</label>
                    <select class="form-control-plain" id="cboHocVien" name="cboHocVien"></select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="cboKhoaHoc">Khóa Học</label>
                    <select class="form-control-plain" id="cboKhoaHoc" name="cboKhoaHoc"></select>
                </div>
                <div class="form-group">
                    <label for="dtpNgayDangKy">Ngày Đăng Ký</label>
                    <input type="date" class="form-control-plain" id="dtpNgayDangKy" name="dtpNgayDangKy">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="hideModal()">Hủy</button>
            <button class="btn btn-success" id="btnSave" onclick="saveData()">💾 Đăng Ký</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/app.js"></script>
<script>
    checkAuth(); renderSidebar('dangkyhoc'); setUserInfo();
    
    function showModal() { 
        document.getElementById('modalForm').classList.add('active'); 
        document.getElementById('dtpNgayDangKy').value = new Date().toISOString().split('T')[0];
    }
    function hideModal() { 
        document.getElementById('modalForm').classList.remove('active'); 
        document.getElementById('txtMaDangKy').value = '';
    }

    async function loadCombos() {
        const [hvRes, khRes] = await Promise.all([fetch('/api/HocVien'), fetch('/api/KhoaHoc')]);
        const [hvData, khData] = await Promise.all([hvRes.json(), khRes.json()]);

        document.getElementById('cboHocVien').innerHTML = '<option value="">-- Chọn Học Viên --</option>' +
            hvData.map(h => `<option value="${h.maHocVien}">${h.maHocVien} - ${h.hoTen}</option>`).join('');

        document.getElementById('cboKhoaHoc').innerHTML = '<option value="">-- Chọn Khóa Học --</option>' +
            khData.map(k => `<option value="${k.maKhoaHoc}">${k.maKhoaHoc} - ${k.tenKhoaHoc}</option>`).join('');
    }

    async function loadData() {
        const res = await fetch('/api/DangKyHoc');
        const data = await res.json();
        const tbody = document.getElementById('dgvDangKy');
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">Chưa có đăng ký nào</div></td></tr>'; return; }
        tbody.innerHTML = data.map(d => `<tr>
            <td><span class="badge badge-info">${d.maDangKy}</span></td>
            <td><strong>${d.tenHocVien}</strong> <small>(${d.maHocVien})</small></td>
            <td><span class="badge badge-success">${d.tenKhoaHoc}</span></td>
            <td>${formatVND(d.hocPhi)}</td>
            <td>${formatDate(d.ngayDangKy)}</td>
            <td><button class="btn-icon delete" onclick="deleteData('${d.maDangKy}')">🗑️</button></td>
        </tr>`).join('');
    }

    async function saveData() {
        const dk = {
            maDangKy: document.getElementById('txtMaDangKy').value.trim(),
            maHocVien: document.getElementById('cboHocVien').value,
            maKhoaHoc: document.getElementById('cboKhoaHoc').value,
            ngayDangKy: document.getElementById('dtpNgayDangKy').value
        };
        if (!dk.maDangKy || !dk.maHocVien || !dk.maKhoaHoc) { showToast('Vui lòng nhập đủ!', 'error'); return; }
        const res = await fetch('/api/DangKyHoc', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(dk) });
        if (res.ok) { showToast('Đăng ký thành công!', 'success'); hideModal(); loadData(); }
        else { const r = await res.json(); showToast(r.message, 'error'); }
    }

    async function deleteData(id) {
        if (!confirm('Hủy đăng ký này?')) return;
        const res = await fetch(`/api/DangKyHoc/${id}`, { method:'DELETE' });
        if (res.ok) { showToast('Đã hủy!', 'success'); loadData(); }
    }

    loadCombos(); loadData();
</script>
</body>
</html>
